name: GreenOps Sentinel CI

# Trigger this workflow every time you push to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # This spins up a temporary Linux server in GitHub's cloud
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven # Speeds up future builds

      - name: ⚙️ Make Maven Wrapper Executable
        run: chmod +x ./mvnw

      - name: 🔨 Compile and Build (Maven)
        run: ./mvnw clean package -DskipTests

      - name: 🐳 Build Docker Image
        run: docker build -t greenops-sentinel-app .

      - name: ✅ Success Summary
        run: echo "Code successfully compiled and Docker image built securely!"