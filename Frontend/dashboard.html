<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenOps Sentinel Dashboard</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px;
        }
        h1 {
            color: #4ade80;
            text-align: center;
            border-bottom: 2px solid #333;
            padding-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
            background-color: #1e1e1e;
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        th {
            background-color: #2d2d2d;
            color: #4ade80;
        }
        tr:hover {
            background-color: #2a2a2a;
        }
        .cpu-badge {
            background-color: #ef4444;
            color: white;
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
        }
        .ai-text {
            color: #9ca3af;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<h1>🌿 GreenOps Sentinel AI Dashboard</h1>

<table>
    <thead>
    <tr>
        <th>Audit ID</th>
        <th>Time</th>
        <th>Instance ID</th>
        <th>CPU Usage</th>
        <th>Gemini AI Recommendation</th>
    </tr>
    </thead>
    <tbody id="audit-table-body">
    <!-- Data will be injected here by JavaScript -->
    </tbody>
</table>

<script>
    // Fetch data from your Spring Boot REST API
    fetch('http://localhost:8080/api/audits')
        .then(response => response.json())
        .then(data => {
            const tableBody = document.getElementById('audit-table-body');

            // Loop through the database records and create HTML rows
            data.forEach(audit => {
                const row = document.createElement('tr');

                // Format the date nicely
                const date = new Date(audit.auditTime).toLocaleString();

                row.innerHTML = `
                    <td>#${audit.id}</td>
                    <td>${date}</td>
                    <td style="color: #60a5fa; font-family: monospace;">${audit.instanceId}</td>
                    <td><span class="cpu-badge">${audit.cpuUsage.toFixed(2)}%</span></td>
                    <td class="ai-text">${audit.aiRecommendation}</td>
                `;
                tableBody.appendChild(row);
            });
        })
        .catch(error => {
            console.error('Error fetching data:', error);
            document.getElementById('audit-table-body').innerHTML = '<tr><td colspan="5" style="text-align:center; color: red;">Failed to connect to Sentinel Backend. Is Docker running?</td></tr>';
        });
</script>
</body>
</html>
